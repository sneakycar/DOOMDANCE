name: Export Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: chickensoft-games/setup-godot@v2
        name: Setup Godot
        with:
          version: 4.4.1
          use-dotnet: false
          include-templates: true

      - name: Install Web export templates
        run: |
          TPL_DIR="$HOME/.local/share/godot/export_templates/4.4.1.stable"
          mkdir -p "$TPL_DIR"
          if [ ! -f "$TPL_DIR/web_release.zip" ]; then
            curl -fsSL -o /tmp/godot-templates.tpz \
              "https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz"
            unzip -qo /tmp/godot-templates.tpz -d "$TPL_DIR"
          fi
          ls -la "$TPL_DIR"/web*.zip

      - name: Export HTML5
        run: |
          godot --version
          godot --headless --import
          mkdir -p public
          godot --headless --export-release "Web" public/index.html 2>&1 | tee export.log
          tail -50 export.log
          test -f public/index.wasm || test -f public/index.pck || (echo "Export did not produce wasm/pck" && exit 1)
          cp -f web/manifest.webmanifest public/manifest.webmanifest
          ls -la public/

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: export web build"
          file_pattern: public/**
